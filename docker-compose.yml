services:
  ksef-encryptor:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "5000"
      WORKERS: "3"
      THREADS: "2"
      KSEF_NODE_BIN: "node"
      KSEF_PDF_BRIDGE_PATH: "./pdf_generator_bridge.mjs"
      KSEF_PDF_MODULE_PATH: "./pdf-generator/dist/ksef-fe-invoice-converter.js"
      KSEF_PDF_TIMEOUT_SECONDS: "60"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
