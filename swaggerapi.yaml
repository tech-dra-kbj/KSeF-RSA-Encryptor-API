swagger: "2.0"
info:
  title: KSeF Integration API
  description: |
    REST API supporting integration with KSeF (Krajowy System e-Faktur).

    1) **/encrypt** – RSAES-OAEP (MGF1 + SHA-256) encryption using a KSeF public certificate.
    2) **/sign_link** – KSeF offline QR verification link signing (RSA-PSS or ECDSA P-256).
    3) **/sign_xml** – XAdES enveloped XML signing (RSA-SHA256 or ECDSA-SHA256).
    4) **/generatePDF** – Invoice PDF visualization from XML.
    5) **/get_pub_cert** – Generate or retrieve an active RSA keypair and X.509 certificate for a given SID.
    6) **/consume** – Secure encrypted RPC tunnel (CMS + AES-256-CBC).

    All binary inputs and outputs are passed as Base64-encoded strings in JSON.
  version: "1.3.1"
  contact:
    name: KBJ DRA
    url: https://github.com/tech-dra-kbj

host: localhost:5000
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json

paths:
  /encrypt:
    post:
      summary: Encrypt data using RSAES-OAEP (MGF1 + SHA-256) with a KSeF certificate
      description: |
        Encrypts `data_b64` using the public key extracted from `cert_b64`.
        Returns the result as Base64.

        Algorithm: RSAES-OAEP, MGF1(SHA-256), SHA-256.
      tags:
        - RSA Encryptor
      parameters:
        - in: body
          name: body
          required: true
          description: Input data for encryption
          schema:
            type: object
            required:
              - data_b64
              - cert_b64
            properties:
              data_b64:
                type: string
                example: "ZGFuZV9pbnB1dA=="
                description: Data to encrypt (Base64), e.g. AES key or token|timestamp
              cert_b64:
                type: string
                example: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t..."
                description: Public certificate (PEM in Base64 or DER in Base64)
              return_b64:
                type: boolean
                example: true
                default: true
                description: Compatibility flag — result is always returned as Base64
      responses:
        200:
          description: Data encrypted successfully
          schema:
            type: object
            required:
              - status
              - encrypted_b64
            properties:
              status:
                type: string
                example: "ok"
              encrypted_b64:
                type: string
                example: "bW9ja19lbmNyeXB0ZWRfYnl0ZXM="
        400:
          description: Input validation error
          schema:
            type: object
            properties:
              status:
                type: string
                example: "error"
              code:
                type: integer
                example: 101
              message:
                type: string
                example: "Missing required fields"
        500:
          description: Internal server error
          schema:
            type: object
            properties:
              status:
                type: string
                example: "error"
              code:
                type: integer
                example: 199
              message:
                type: string
                example: "Unexpected error: ..."

  /sign_link:
    post:
      summary: Sign a KSeF QR verification link (RSA-PSS or ECDSA P-256)
      operationId: sign_link
      description: |
        Generates a cryptographic signature for a KSeF offline verification link (KOD II).

        The signed string is the URL fragment: `host + path` without the `https://` scheme and without a trailing `/`.
        Example string to sign:

        `qr-demo.ksef.mf.gov.pl/certificate/Nip/1111111111/1111111111/01ABC.../HASH...`

        **Algorithms:**
        - `rsa_pss` – RSASSA-PSS, SHA-256, MGF1(SHA-256), salt=32 (min. 2048-bit key)
        - `ecdsa_p256` – ECDSA (P-256 / secp256r1) + SHA-256, signature encoded as:
          - `p1363` (recommended): R||S, 32 bytes each (64 bytes total)
          - `der`: ASN.1 DER SEQUENCE

        The input link may be a full URL (`https://...`) or without scheme (`qr-demo...`).
        The response contains the final link (with signature appended as the last path segment) in Base64.
      tags:
        - Link Signer
      parameters:
        - in: body
          name: body
          required: true
          description: Link signing input
          schema:
            type: object
            required:
              - link_b64
              - cert_pem_b64
              - key_pem_b64
            properties:
              link_b64:
                type: string
                description: Full link to sign (Base64 UTF-8). May include or omit `https://` and trailing `/`.
                example: "cXItZGVtby5rc2VmLm1mLmdvdi5wbC9jZXJ0aWZpY2F0ZS9OaXAvODExMTY5MzM3MC84MTExNjkzMzcwLzAxM0MzNEQ0QzlCN0UyNzYvSGFzaA=="
              cert_pem_b64:
                type: string
                description: PEM certificate (Base64). Used to verify key pair consistency.
                example: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t..."
              key_pem_b64:
                type: string
                description: Private key PEM (Base64).
                example: "LS0tLS1CRUdJTiBFTkNSWVBURUQgUFJJVkFURSBLRVktLS0tLQ=="
              key_password_b64:
                type: string
                description: Private key password – Base64(UTF-8). Optional.
                example: "emFxMUBXU1hjZGUzJFJGVg=="
              alg:
                type: string
                description: Signature algorithm.
                enum:
                  - rsa_pss
                  - ecdsa_p256
                default: rsa_pss
                example: ecdsa_p256
              ecdsa_format:
                type: string
                description: ECDSA signature encoding format.
                enum:
                  - p1363
                  - der
                default: p1363
                example: p1363
      responses:
        200:
          description: Signature generated, final link returned
          schema:
            type: object
            required:
              - link_b64
              - alg_used
            properties:
              link_b64:
                type: string
                description: Final link (Base64 UTF-8) with signature appended as the last path segment.
                example: "aHR0cHM6Ly9xci1kZW1vLmtzZWYubWYuZ292LnBsL2NlcnRpZmljYXRlL05pcC8xMTExMTExMTExLzExMTExMTExMTEvMDFG...L0hBU0guLi4vU0lHTi4uLg=="
              alg_used:
                type: string
                example: "ecdsa_p256"
              ecdsa_format_used:
                type: string
                example: "p1363"
        400:
          description: Validation or input error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Cannot load private key PEM: ..."
        500:
          description: Internal server error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unexpected error: ..."

  /sign_xml:
    post:
      summary: Sign XML using XAdES enveloped signature (RSA-SHA256 or ECDSA-SHA256)
      operationId: sign_xml
      description: |
        Signs the provided XML with an XAdES enveloped signature.
        Input is passed exclusively as Base64.

        **Algorithm selection (`alg`):**
        - `rsa_sha256` – when the private key is RSA
        - `ecdsa_sha256` – when the private key is EC (P-256 / secp256r1 enforced)

        Returns the signed XML document as `signed_xml_b64` (Base64).
      tags:
        - XAdES Signer
      parameters:
        - in: body
          name: body
          required: true
          description: XAdES signing input
          schema:
            type: object
            required:
              - xml_b64
              - cert_pem_b64
              - key_pem_b64
            properties:
              xml_b64:
                type: string
                description: XML to sign (Base64).
                example: "PEF1dGhUb2tlblJlcXVlc3Q+Li4uPC9BdXRoVG9rZW5SZXF1ZXN0Pg=="
              cert_pem_b64:
                type: string
                description: Certificate in PEM format (Base64).
                example: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t..."
              key_pem_b64:
                type: string
                description: Private key in PEM format (Base64).
                example: "LS0tLS1CRUdJTiBFTkNSWVBURUQgUFJJVkFURSBLRVktLS0tLQ=="
              key_password_b64:
                type: string
                description: Private key password – Base64(UTF-8). Optional.
                example: "emFxMUBXU1hjZGUzJFJGVg=="
              alg:
                type: string
                description: Signature algorithm.
                enum:
                  - rsa_sha256
                  - ecdsa_sha256
                default: rsa_sha256
                example: ecdsa_sha256
      responses:
        200:
          description: Signature generated
          schema:
            type: object
            required:
              - signed_xml_b64
              - alg_used
            properties:
              signed_xml_b64:
                type: string
                description: Signed XML (Base64).
                example: "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPFNpZ25lZC4uLg=="
              alg_used:
                type: string
                example: "ecdsa_sha256"
        400:
          description: Validation or input error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Cannot load private key PEM (key_pem_b64): ..."
        500:
          description: Internal server error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unexpected error: ..."

  /generatePDF:
    post:
      summary: Generate invoice PDF from XML
      operationId: generate_pdf
      description: |
        Generates a PDF visualization of an invoice from XML (FA(1), FA(2), FA(3), FA_RR).

        - Input: XML passed as Base64 in `xml_b64`
        - Default response: JSON with `pdf_b64`
        - For `response_type = binary`: returns raw `application/pdf`

        > **Note:** English (`language: en`) is a test feature. Official English translations
        > of KSeF invoice field labels are not available — the current EN translation was
        > generated with GPT and is provided for testing purposes only.

        Example (curl + jq — recommended):

                curl -X POST http://localhost:5000/generatePDF \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n \
                    --arg xml_b64 "$(base64 -w 0 invoice.xml)" \
                    '{
                      xml_b64: $xml_b64,
                      response_type: "base64",
                      additional_data: {
                        nrKSeF: "20260101-1234567890-ABCDEF1234567890"
                      }
                    }'
                  )"

        Save PDF to file:

                curl -X POST http://localhost:5000/generatePDF \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg xml_b64 "$(base64 -w 0 invoice.xml)" '{xml_b64: $xml_b64, response_type: "binary"}')" \
                  --output invoice.pdf
      tags:
        - PDF Generator
      consumes:
        - application/json
      produces:
        - application/json
        - application/pdf
      parameters:
        - in: body
          name: body
          required: true
          description: PDF generation input
          schema:
            type: object
            required:
              - xml_b64
            properties:
              xml_b64:
                type: string
                description: Invoice XML content encoded as Base64(UTF-8).
                example: "PEZha3R1cmE+PE5hZ2xvd2VrPi4uLjwvTmFnbG93ZWs+PC9GYWt0dXJhPg=="
              response_type:
                type: string
                description: Response format.
                enum:
                  - base64
                  - binary
                default: base64
                example: base64
              additional_data:
                type: object
                description: Optional data passed through to the PDF generator.
                properties:
                  nr_ksef:
                    type: string
                    description: KSeF invoice number printed on the PDF.
                    example: "20260101-1234567890-ABCDEF1234567890"
                  qr_code:
                    type: string
                    description: QR code URL.
                    example: "https://ksef.mf.gov.pl/..."
                  qr2_code:
                    type: string
                    description: Second QR code URL.
                  is_mobile:
                    type: boolean
                    description: Mobile layout variant.
                    default: false
                  watermark:
                    type: string
                    description: Watermark text printed on every page (e.g. "KOPIA", "ANULOWANA").
                    example: "KOPIA"
                  language:
                    type: string
                    description: PDF label language. Case-insensitive.
                    enum:
                      - pl
                      - en
                    default: pl
                    example: pl
      responses:
        200:
          description: PDF generated successfully
          schema:
            type: object
            properties:
              status:
                type: string
                example: "ok"
              pdf_b64:
                type: string
                example: "JVBERi0xLjQKJcTl8uXr..."
        400:
          description: Input validation error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Required: 'xml_b64' (Base64-encoded XML)."
        500:
          description: PDF generator error
          schema:
            type: object
            properties:
              error:
                type: string
                example: "PDF generator failed: ..."

  /health:
    get:
      summary: Service health check
      description: |
        Health check endpoint for monitoring and container probes (e.g. Kubernetes liveness/readiness).
      tags:
        - Monitoring
      responses:
        200:
          description: Service is running
          schema:
            type: object
            required:
              - status
              - service
            properties:
              status:
                type: string
                example: "ok"
              service:
                type: string
                example: "KSeF Integration API"
              version:
                type: string
                example: "1.3.1"

  /get_pub_cert:
    post:
      summary: Generate or retrieve an active RSA public key and certificate for a given SID
      description: |
        Generates or retrieves an active RSA-2048 keypair and a self-signed X.509 certificate
        bound to the provided System ID (`sid`).
        The keypair is stored in SQLite and expires after the configured TTL (default: 24h).
        Used to establish credentials for the `/consume` secure tunnel.
      tags:
        - Key Management
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - sid
            properties:
              sid:
                type: string
                description: "System ID — pattern: ^[A-Z0-9]{6}$"
                example: "SYS123"
      responses:
        200:
          description: Keypair returned or generated
          schema:
            type: object
            properties:
              sid:
                type: string
                example: "SYS123"
              kid:
                type: string
                example: "8d3cfb5b-21fb-4e1b-9fca-5777df50ad6d"
              created_at:
                type: integer
                example: 1714560000
              expires_at:
                type: integer
                example: 1714646400
              public_key_pem_b64:
                type: string
                example: "LS0tLS1CRUdJTiBQVUJMSUMgS0VZLS0tLS0..."
              public_cert_pem_b64:
                type: string
                example: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t..."
        400:
          description: Invalid or missing SID

  /consume:
    post:
      summary: Secure encrypted RPC tunnel (CMS + AES-256-CBC)
      description: |
        Accepts an encrypted payload wrapped in a CMS EnvelopedData structure (RFC 5652).
        Unwraps the AES key using the internal private key for the given SID,
        decrypts the payload with AES-256-CBC, dispatches the inner request to a local endpoint
        (e.g. `/encrypt`), and returns the result as plaintext or encrypted with the client's certificate.

        **Payload wrapping flow:**
        ```
        [JSON plaintext] → AES-256-CBC (random key + IV)
          ├── AES key wrapped in CMS EnvelopedData using the SID certificate
          └── enc_key_b64 + iv_b64 + ciphertext_b64 sent in request
        ```
      tags:
        - Key Management
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - sid
              - kid
              - enc_key_b64
              - iv_b64
              - ciphertext_b64
            properties:
              sid:
                type: string
                example: "SYS123"
              kid:
                type: string
                example: "8d3cfb5b-21fb-4e1b-9fca-5777df50ad6d"
              enc_key_b64:
                type: string
                description: AES key wrapped in CMS EnvelopedData (Base64)
                example: "MIIByQYJKoZIhvcNAQcDoIIBujCCAbYCAQA..."
              iv_b64:
                type: string
                description: AES-CBC initialization vector (Base64)
                example: "cGFzc3dvcmQxMjM0NTY3OA=="
              ciphertext_b64:
                type: string
                description: Encrypted payload (Base64)
                example: "Y2lwaGVydGV4dF9zb21ldGhpbmc="
              reply_cert_pem_b64:
                type: string
                description: Optional client certificate to encrypt the response (Base64 PEM)
                example: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t..."
      responses:
        200:
          description: OK — plaintext or encrypted reply
          schema:
            type: object
            properties:
              status:
                type: string
                example: "ok"
              plaintext_b64:
                type: string
                description: Plaintext response (when reply_cert_pem_b64 is not provided)
                example: "eyJzdGF0dXMiOiJvayJ9"
              reply:
                type: object
                description: Encrypted response (when reply_cert_pem_b64 is provided)
                properties:
                  enc_key_b64:
                    type: string
                  iv_b64:
                    type: string
                  ciphertext_b64:
                    type: string
        400:
          description: Decryption or dispatch error

  /:
    get:
      summary: Service metadata
      description: |
        Returns service name, version, and paths to health check and Swagger UI.
      tags:
        - Monitoring
      responses:
        200:
          description: OK
          schema:
            type: object
            properties:
              service:
                type: string
                example: "KSeF Integration API 1.3.1"
              docs:
                type: string
                example: "/apidocs"
              health:
                type: string
                example: "/health"
